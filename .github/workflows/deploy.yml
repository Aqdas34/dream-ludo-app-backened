name: Deploy Backend to VPS

on:
  push:
    branches:
      - master
    paths:
      - 'ludo-game-backened/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ludo-game-project/ludo-game-backened
            git pull origin master
            
            # 🚀 Automatically Inject Environment Variables from Secrets
            printf "%s" "${{ secrets.PROJECT_ENV }}" > .env
            
            # Use NVM to ensure correct Node version
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            npm install
            npm run build
            
            # 🔥 Restart the server with PM2
            pm2 delete ludo-api || true
            pm2 start dist/index.js --name ludo-api
            pm2 save
